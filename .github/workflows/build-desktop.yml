name: Build Windows Desktop

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - ".github/workflows/build-desktop.yml"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Portable EXE
    runs-on: windows-latest

    env:
      PORTABLE_NAME: Nermes-v${{ github.ref_name }}-portable

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install deps
        working-directory: desktop
        run: pnpm install

      - name: Build Tauri (portable, no installer)
        working-directory: desktop
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Package portable EXE
        shell: pwsh
        run: |
          $src = "desktop/src-tauri/target/x86_64-pc-windows-msvc/release/nermes-desktop.exe"
          $destDir = "portable-package"
          mkdir $destDir
          Copy-Item $src "$destDir/Nermes.exe"
          # Also include the WebView2 bootstrapper as a helper note
          @"
          Nermes 桌面管理工具 — 便携版（免安装）

          用法：双击 Nermes.exe 即可运行

          要求：
          - Windows 10 1809+ 或 Windows 11
          - 系统需安装 WebView2 运行时（Win11 已内置，Win10 若无反应请下载）
            https://go.microsoft.com/fwlink/p/?LinkId=2124703

          日志位置：%LOCALAPPDATA%\Nermes\desktop.log
          "@ | Out-File -FilePath "$destDir/使用说明.txt" -Encoding UTF8

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: nermes-desktop-portable
          path: portable-package/*
